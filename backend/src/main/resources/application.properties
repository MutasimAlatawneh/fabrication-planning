spring.application.name=backend

spring.datasource.url=jdbc:postgresql://localhost:5432/fabrication_db
spring.datasource.username=postgres
spring.datasource.password=motasem123
spring.datasource.driver-class-name=org.postgresql.Driver

# Use 'update' so Hibernate manages schema evolution; data persists between restarts
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Do not auto-run schema.sql/data.sql — they are kept as documentation artifacts
spring.sql.init.mode=never
