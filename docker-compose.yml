version: '3.8'

services:
  db:
    image: postgres:16
    container_name: fabrication-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: motasem123
      POSTGRES_DB: fabrication_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d fabrication_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: fabrication-backend
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/fabrication_db
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=motasem123
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    container_name: fabrication-frontend
    ports:
      - "4200:80"
    depends_on:
      - backend

volumes:
  postgres_data:
