<div class="login-page">
  <div class="login-card">

    <!-- Branding header matching the navbar -->
    <div class="login-header">
      <h2 class="login-title">⚙️ Fabrication Planner</h2>
      <p class="login-subtitle">Sign in to manage your fabrication workflow</p>
    </div>

    <!-- Login Form -->
    <form (ngSubmit)="onSubmit()" class="login-form">

      <div class="form-group">
        <label for="username" class="form-label">Username</label>
        <div class="input-wrapper">
          <span class="input-icon">👤</span>
          <input
            type="text"
            id="username"
            class="form-control"
            placeholder="Enter your username"
            [(ngModel)]="username"
            name="username"
            required
            autocomplete="username"
          >
        </div>
      </div>

      <div class="form-group">
        <label for="password" class="form-label">Password</label>
        <div class="input-wrapper">
          <span class="input-icon">🔒</span>
          <input
            type="password"
            id="password"
            class="form-control"
            placeholder="Enter your password"
            [(ngModel)]="password"
            name="password"
            required
            autocomplete="current-password"
          >
        </div>
      </div>

      <!-- Error Message -->
      <div class="error-message" *ngIf="errorMessage">
        ⚠️ {{ errorMessage }}
      </div>

      <!-- Submit Button -->
      <button
        type="submit"
        class="btn-login"
        [disabled]="isLoading || !username || !password"
      >
        <span *ngIf="!isLoading">Login</span>
        <span *ngIf="isLoading" class="spinner"></span>
      </button>

    </form>

    <div class="login-footer">
      <p class="text-muted">Fabrication Planning System &copy; 2026</p>
    </div>
  </div>
</div>
